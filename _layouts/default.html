<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;600;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <header class="header">
        <div class="container">
            <h1 class="logo"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
        </div>
    </header>
    <main class="content">
        {{ content }}
    </main>
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 {{ site.title }}. All rights reserved.</p>
        </div>
    </footer>
</body>

</html>
